name: Update PKGBUILDs

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update-sing-box-beta-bin:
    name: Update sing-box-beta-bin
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get latest pre-release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh api repos/SagerNet/sing-box/releases \
            --jq '[.[] | select(.prerelease)] | first | .tag_name | ltrimstr("v")')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check current version
        id: check
        run: |
          CURRENT=$(grep '^_pkgver=' repo/sing-box-beta-bin/PKGBUILD | cut -d'"' -f2)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "${{ steps.version.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download assets and compute sha256sums
        if: steps.check.outputs.skip == 'false'
        id: sums
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GIT_URL: https://github.com/SagerNet/sing-box
        run: |
          for ARCH in x86_64 aarch64 armv7h; do
            # upstream uses armv7hl in filenames for armv7h
            FILE_ARCH="$ARCH"
            [ "$ARCH" = "armv7h" ] && FILE_ARCH="armv7hl"
            FILE="sing-box_${VERSION}_linux_${FILE_ARCH}.pkg.tar.zst"
            URL="$GIT_URL/releases/download/v${VERSION}/$FILE"
            wget -q "$URL" -O "$FILE"
            SUM=$(sha256sum "$FILE" | awk '{print $1}')
            echo "sum_${ARCH}=$SUM" >> "$GITHUB_OUTPUT"
            rm "$FILE"
          done

      - name: Update PKGBUILD
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SUM_X86_64: ${{ steps.sums.outputs.sum_x86_64 }}
          SUM_ARMV7H: ${{ steps.sums.outputs.sum_armv7h }}
          SUM_AARCH64: ${{ steps.sums.outputs.sum_aarch64 }}
        run: |
          sed -i "s/^_pkgver=.*/_pkgver=\"${VERSION}\"/" repo/sing-box-beta-bin/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=\"1\"/" repo/sing-box-beta-bin/PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=(\"${SUM_X86_64}\")/" repo/sing-box-beta-bin/PKGBUILD
          sed -i "s/^sha256sums_armv7h=.*/sha256sums_armv7h=(\"${SUM_ARMV7H}\")/" repo/sing-box-beta-bin/PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=(\"${SUM_AARCH64}\")/" repo/sing-box-beta-bin/PKGBUILD

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/sing-box-beta-bin/PKGBUILD
          git commit -m "feat(pkg): Update sing-box-beta-bin to ${VERSION}"
          git push || (git pull --rebase && git push)

  update-telegram-bot-api:
    name: Update telegram-bot-api
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get latest version from CMakeLists.txt
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(curl -sf "https://raw.githubusercontent.com/tdlib/telegram-bot-api/master/CMakeLists.txt" \
            | grep -oP 'project\(TelegramBotApi VERSION \K[0-9]+\.[0-9]+')
          COMMIT=$(gh api repos/tdlib/telegram-bot-api/commits/master --jq '.sha')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Check current version
        id: check
        run: |
          CURRENT=$(grep '^pkgver=' repo/telegram-bot-api/PKGBUILD | cut -d'=' -f2)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "${{ steps.version.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT: ${{ steps.version.outputs.commit }}
        run: |
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" repo/telegram-bot-api/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" repo/telegram-bot-api/PKGBUILD
          sed -i "s/#commit=[0-9a-f]*/#commit=${COMMIT}/" repo/telegram-bot-api/PKGBUILD

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/telegram-bot-api/PKGBUILD
          git commit -m "feat(pkg): Update telegram-bot-api to ${VERSION}"
          git push || (git pull --rebase && git push)

  update-acme-sh-letsencrypt:
    name: Update acme.sh-letsencrypt
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get latest release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh api repos/acmesh-official/acme.sh/releases/latest \
            --jq '.tag_name | ltrimstr("v")')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check current version
        id: check
        run: |
          CURRENT=$(grep '^pkgver=' repo/acme.sh-letsencrypt/PKGBUILD | cut -d'=' -f2)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "${{ steps.version.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute sha512sum
        if: steps.check.outputs.skip == 'false'
        id: sums
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GIT_URL: https://github.com/acmesh-official/acme.sh
        run: |
          FILE="acme.sh-${VERSION}.tar.gz"
          wget -q "$GIT_URL/archive/refs/tags/${VERSION}.tar.gz" -O "$FILE"
          SUM=$(sha512sum "$FILE" | awk '{print $1}')
          echo "sha512=$SUM" >> "$GITHUB_OUTPUT"
          rm "$FILE"

      - name: Update PKGBUILD
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA512: ${{ steps.sums.outputs.sha512 }}
        run: |
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" repo/acme.sh-letsencrypt/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" repo/acme.sh-letsencrypt/PKGBUILD
          sed -i "s/^sha512sums=.*/sha512sums=('${SHA512}')/" repo/acme.sh-letsencrypt/PKGBUILD

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/acme.sh-letsencrypt/PKGBUILD
          git commit -m "feat(pkg): Update acme.sh-letsencrypt to ${VERSION}"
          git push || (git pull --rebase && git push)

  update-ksutils-teamspeak-management-tools:
    name: Update ksutils-teamspeak-management-tools
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get latest release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh api repos/KunoiSayami/teamspeak-management-tools.rs/releases/latest \
            --jq '.tag_name | ltrimstr("v")')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check current version
        id: check
        run: |
          CURRENT=$(grep '^pkgver=' repo/ksutils-teamspeak-management-tools/PKGBUILD | cut -d'=' -f2)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "${{ steps.version.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" repo/ksutils-teamspeak-management-tools/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" repo/ksutils-teamspeak-management-tools/PKGBUILD

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/ksutils-teamspeak-management-tools/PKGBUILD
          git commit -m "feat(pkg): Update ksutils-teamspeak-management-tools to ${VERSION}"
          git push || (git pull --rebase && git push)
